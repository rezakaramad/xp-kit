name: Release Function

on:
  push:
    tags:
      - 'functions/*/v[0-9]*'

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Build and push ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve function name and version from tag
        id: meta
        run: |
          # Tag format: functions/<name>/v<semver>  e.g. functions/xdeployment/v0.1.0
          TAG="${{ github.ref_name }}"
          FUNCTION="${TAG#functions/}"
          FUNCTION="${FUNCTION%/v*}"
          VERSION="${TAG##*/}"
          OWNER="${{ github.repository_owner }}"
          echo "function=${FUNCTION}"                                         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"                                           >> "$GITHUB_OUTPUT"
          echo "runtime_image=ghcr.io/${OWNER}/function-${FUNCTION}-runtime" >> "$GITHUB_OUTPUT"
          echo "xpkg_image=ghcr.io/${OWNER}/function-${FUNCTION}"            >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version-file: functions/${{ steps.meta.outputs.function }}/go.mod
          cache-dependency-path: functions/${{ steps.meta.outputs.function }}/go.sum

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Write a netrc file so 'go mod download' inside the Docker build can
      # fetch private modules. Passed as a build secret — never baked into the image.
      - name: Create netrc for private Go modules
        run: |
          printf 'machine github.com\nlogin x-access-token\npassword %s\n' \
            "${{ secrets.GITHUB_TOKEN }}" > /tmp/netrc
          chmod 600 /tmp/netrc

      # Build the multi-arch runtime image and push it to ghcr.io.
      # The digest is captured so the xpkg step pins to the exact image.
      - name: Build and push runtime image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: functions/${{ steps.meta.outputs.function }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.runtime_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.runtime_image }}:latest
          build-args: |
            GO_VERSION=1.26
          secrets: |
            netrc=/tmp/netrc
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Crossplane CLI
        run: |
          version=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/crossplane/crossplane/releases/latest \
            | jq -r '.tag_name')
          curl -fsSL \
            "https://github.com/crossplane/crossplane/releases/download/${version}/crossplane_linux_amd64" \
            -o /tmp/crossplane
          sudo install -m 0755 /tmp/crossplane /usr/local/bin/crossplane
          crossplane version

      # Write a plain Docker config (no credential helper) so the crossplane
      # CLI's OCI client can authenticate against ghcr.io on private repos.
      # The runner's default Docker config may use a credential helper binary
      # that isn't available to non-docker processes.
      - name: Write Docker config for Crossplane CLI
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          mkdir -p /tmp/xpkg-docker
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' "$GHCR_USER" "$GHCR_TOKEN" | base64 -w 0)" \
            > /tmp/xpkg-docker/config.json

      # Build the crossplane xpkg, embedding the runtime image by digest for
      # a reproducible and content-addressable package.
      - name: Build crossplane xpkg
        env:
          DOCKER_CONFIG: /tmp/xpkg-docker
        run: |
          crossplane xpkg build \
            --package-root=functions/${{ steps.meta.outputs.function }}/package \
            --embed-runtime-image=${{ steps.meta.outputs.runtime_image }}@${{ steps.docker.outputs.digest }} \
            -o /tmp/function.xpkg

      - name: Push crossplane xpkg
        env:
          DOCKER_CONFIG: /tmp/xpkg-docker
        run: |
          crossplane xpkg push \
            -f /tmp/function.xpkg \
            ${{ steps.meta.outputs.xpkg_image }}:${{ steps.meta.outputs.version }}
          crossplane xpkg push \
            -f /tmp/function.xpkg \
            ${{ steps.meta.outputs.xpkg_image }}:latest
