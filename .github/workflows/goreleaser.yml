name: GoReleaser

on:
  push:
    tags:
      - 'cmd/*/v[0-9]*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve module path and semver from tag
        id: meta
        run: |
          # Tag format: cmd/<name>/v<semver>  e.g. cmd/gen-xrd/v0.3.1
          TAG="${{ github.ref_name }}"
          MODULE=$(echo "$TAG" | sed 's|/v[0-9].*||')
          VERSION="${TAG##*/}"
          echo "module=${MODULE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ steps.meta.outputs.module }}/go.mod
          cache-dependency-path: ${{ steps.meta.outputs.module }}/go.sum

      - name: Set GoReleaser tag override
        run: |
          echo "GORELEASER_CURRENT_TAG=${{ steps.meta.outputs.version }}" >> "$GITHUB_ENV"

      - name: Create local semver tag for GoReleaser
        run: |
          git tag -f "${{ steps.meta.outputs.version }}" "${{ github.sha }}"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ~> v2
          args: build --clean --config ${{ steps.meta.outputs.module }}/.goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts to existing release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find dist -type f ! -name '*.json' -print0 | xargs -0 gh release upload "${{ github.ref_name }}" --clobber
