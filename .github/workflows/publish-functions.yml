name: Publish Functions

on:
  push:
    tags:
      - 'functions/*/v[0-9]*'

permissions:
  contents: read
  packages: write

jobs:
  fn-build-and-publish:
    name: Build and publish ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Resolve function name and version from tag
        id: meta
        run: |
          # Tag format: functions/<name>/v<semver>  e.g. functions/xdeployment/v0.1.0
          TAG="${{ github.ref_name }}"
          # Remove leading functions/ so the result would be xdeployment/v0.1.0 in our example
          FUNCTION="${TAG#functions/}"
          # Remove trailing /v... so the result would be xdeployment
          FUNCTION="${FUNCTION%/v*}"
          # Remove everything up to and including the last / so the result would be v0.1.0
          VERSION="${TAG##*/}"
          OWNER="${{ github.repository_owner }}"
          echo "function=${FUNCTION}"                                         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"                                           >> "$GITHUB_OUTPUT"
          echo "runtime_image=ghcr.io/${OWNER}/function-${FUNCTION}-runtime" >> "$GITHUB_OUTPUT"
          echo "xpkg_image=ghcr.io/${OWNER}/function-${FUNCTION}"            >> "$GITHUB_OUTPUT"

      - name: Setup a Go environment
        uses: actions/setup-go@v6
        with:
          go-version-file: functions/${{ steps.meta.outputs.function }}/go.mod
          cache-dependency-path: functions/${{ steps.meta.outputs.function }}/go.sum

      # Install QEMU emulators so the Docker daemon can build for foreign architectures (e.g. arm64 on amd64).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Create a BuildKit builder instance, required for multi-platform image builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the multi-arch runtime image and push it to ghcr.io.
      # The digest is captured so the xpkg step pins to the exact image.
      - name: Build and push runtime image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: functions/${{ steps.meta.outputs.function }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.runtime_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.runtime_image }}:latest
          build-args: |
            GO_VERSION=1.26
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/main/install.sh | sh
          sudo mv crossplane /usr/local/bin

      # Build the crossplane xpkg, embedding the runtime image by digest for
      # a reproducible and content-addressable package.
      - name: Build crossplane xpkg
        run: |
          docker pull ${{ steps.meta.outputs.runtime_image }}@${{ steps.docker.outputs.digest }}
          crossplane xpkg build \
            --package-root=functions/${{ steps.meta.outputs.function }}/package \
            --embed-runtime-image=${{ steps.meta.outputs.runtime_image }}@${{ steps.docker.outputs.digest }} \
            -o /tmp/function.xpkg

      - name: Push crossplane xpkg
        run: |
          crossplane xpkg push \
            -f /tmp/function.xpkg \
            ${{ steps.meta.outputs.xpkg_image }}:${{ steps.meta.outputs.version }}
          crossplane xpkg push \
            -f /tmp/function.xpkg \
            ${{ steps.meta.outputs.xpkg_image }}:latest
