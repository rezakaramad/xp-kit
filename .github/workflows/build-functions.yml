name: Build and publish Crossplane function packages

on:
  push:
    tags:
      - "functions/*/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. functions/xdeployment/v0.0.1)"
        required: true

env:
  REGISTRY: ghcr.io
  GO_VERSION: "1.26"
  GOLANGCI_VERSION: "v2.12.2"
  CROSSPLANE_CLI_VERSION: "v2.3.1"
  GOPRIVATE: "github.com/rezakaramad"
  GONOSUMDB: "github.com/rezakaramad"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git for private modules
        run: git config --global url."https://${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Resolve function name and version
        id: vars
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          function_name="${tag#functions/}"
          version="${function_name##*/}"
          function_name="${function_name%/v*}"
          echo "function=${function_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "path=functions/${function_name}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_VERSION }}
          working-directory: ${{ steps.vars.outputs.path }}
          args: --config ../../.golangci.yml

      - name: Test
        working-directory: ${{ steps.vars.outputs.path }}
        run: go test -v -cover ./...

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        id: build
        env:
          FUNCTION_PATH: ${{ steps.vars.outputs.path }}
          FUNCTION_NAME: ${{ steps.vars.outputs.function }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          runtime_image="${REGISTRY}/${{ github.repository_owner }}/${FUNCTION_NAME}-runtime:${VERSION}"
          echo "runtime_image=${runtime_image}" >> "$GITHUB_OUTPUT"

          ctx=$(mktemp -d)
          trap 'rm -rf "$ctx"' EXIT
          cp -a "${FUNCTION_PATH}/." "$ctx/"

          module_prefix="github.com/${{ github.repository }}"
          while IFS= read -r module; do
            rel="${module#${module_prefix}/}"
            if [[ -d "$rel" ]]; then
              mkdir -p "$ctx/$(dirname "$rel")"
              cp -a "$rel" "$ctx/$rel"
              (cd "$ctx" && go mod edit -replace="${module}=./${rel}")
            fi
          done < <(awk '$2 == "v0.0.0" {print $1}' "${FUNCTION_PATH}/go.mod" | grep "^${module_prefix}/" || true)

          docker build \
            --platform linux/amd64 \
            --build-arg GO_VERSION="${GO_VERSION}" \
            -t "${runtime_image}" \
            "$ctx"

          docker push "${runtime_image}"

      - name: Install Crossplane CLI
        run: |
          curl -fsSL "https://releases.crossplane.io/stable/${{ env.CROSSPLANE_CLI_VERSION }}/bin/linux_amd64/crank" \
            -o /tmp/crank && chmod +x /tmp/crank && sudo mv /tmp/crank /usr/local/bin/crossplane

      - name: Build and push Crossplane package
        env:
          FUNCTION_PATH: ${{ steps.vars.outputs.path }}
          FUNCTION_NAME: ${{ steps.vars.outputs.function }}
          VERSION: ${{ steps.vars.outputs.version }}
          RUNTIME_IMAGE: ${{ steps.build.outputs.runtime_image }}
        run: |
          pkg_file="${FUNCTION_PATH}/${FUNCTION_NAME}.xpkg"
          published="ghcr.io/${{ github.repository_owner }}/function-${FUNCTION_NAME}"

          crossplane xpkg build \
            --package-root "${FUNCTION_PATH}/package" \
            --embed-runtime-image "${RUNTIME_IMAGE}" \
            --package-file "${pkg_file}"

          crossplane xpkg push -f "${pkg_file}" "${published}:${VERSION}"
          crossplane xpkg push -f "${pkg_file}" "${published}:latest"
