name: Build and publish Crossplane function packages

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "!functions/**/*.md"
    tags:
      - "functions/*/v*"
  pull_request:
    paths:
      - "functions/**"
      - "!functions/**/*.md"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FUNCTIONS_DIR: functions
  GO_VERSION: "1.26"
  GOLANGCI_VERSION: "v2.12.2"
  CROSSPLANE_CLI_VERSION: "v1.19.1"

concurrency:
  group: crossplane-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          # If the workflow was triggered by a tag, it assumes you want exactly one function.
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Takes the tag name e.g., functions/xtenant-validate/v0.3.1
            function_name="${{ github.ref_name }}"
            # Removes the "functions/" prefix e.g., xtenant-validate/v0.3.1
            function_name="${function_name#functions/}"
            # Removes the "/v0.3.1" suffix e.g., xtenant-validate
            function_name="${function_name%/v*}"
            # Converts to JSON array e.g., ["xtenant-validate"]
            dirs=$(printf '%s\n' "$function_name" | jq -R -s -c 'split("\n")[:-1]')
          else
            # Otherwise, it discovers all function directories under the FUNCTIONS_DIR.
            dirs=$(find "$FUNCTIONS_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort | jq -R -s -c 'split("\n")[:-1]')
          fi

          # Writes a GitHub Actions output named "matrix"
          # with the value of the JSON array of function names.
          # E.g., ["xtenant-validate", "xtenant-render"] or ["xtenant-validate"] depending on the trigger.
          echo "matrix={\"function\":$dirs}" >> "$GITHUB_OUTPUT"

  lint:
    needs: discover
    runs-on: ubuntu-latest

    # Loop over the discovered function directories and run linting for each.
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # We run linting before tests, so we don't want to cache test dependencies yet.
          cache: false

      - name: Check go mod tidy
        shell: bash
        run: |
          set -euo pipefail
          # Run `go mod tidy` in the function directory and check that it doesn't change go.mod or go.sum.
          function_path="${{ env.FUNCTIONS_DIR }}/${{ matrix.function }}"
          (
            cd "$function_path"
            go mod tidy
          )
          # Check that go.mod and go.sum are unchanged after running tidy.
          git diff --exit-code -- "$function_path/go.mod" "$function_path/go.sum"

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_VERSION }}
          working-directory: ${{ env.FUNCTIONS_DIR }}/${{ matrix.function }}
          args: --config ../../.golangci.yml

  unit-test:
    needs: discover
    runs-on: ubuntu-latest

    strategy:
      # We want to run tests for all functions even if some fail, so we set fail-fast to false.
      fail-fast: false
      # Loop over the discovered function directories and run tests for each.
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run unit tests
        working-directory: ${{ env.FUNCTIONS_DIR }}/${{ matrix.function }}
        run: go test -v -cover ./...

  build:
    needs: [discover, lint, unit-test]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set variables
        shell: bash
        run: |
          set -euo pipefail

          # Determine the image tag based on the Git reference.
          image_tag="${{ github.sha }}"
          # If the workflow was triggered by a tag, use the tag name
          # as the image tag instead of the commit SHA.
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Takes the tag name e.g., functions/xtenant-validate/v0.3.1
            image_tag="${{ github.ref_name }}"
            # Keeps only everything after the last "/"
            # E.g., functions/xtenant-validate/v0.3.1 → v0.3.1
            image_tag="${image_tag##*/}"
          fi

          # E.g., for matrix.function=xtenant-validate, this sets:
          #     FUNCTION_NAME=xtenant-validate
          #     PUBLISHED_FUNCTION_NAME=function-xtenant-validate
          #     FUNCTION_PATH=functions/xtenant-validate
          #     PACKAGE_FILE=functions/xtenant-validate/xtenant-validate.xpkg
          #     RUNTIME_IMAGE=ghcr.io/<owner>/xtenant-validate-runtime:<tag>
          #     XPKG_VERSION=<tag>
          echo "FUNCTION_NAME=${{ matrix.function }}" >> "$GITHUB_ENV"
          echo "PUBLISHED_FUNCTION_NAME=function-${{ matrix.function }}" >> "$GITHUB_ENV"
          echo "FUNCTION_PATH=${{ env.FUNCTIONS_DIR }}/${{ matrix.function }}" >> "$GITHUB_ENV"
          echo "PACKAGE_FILE=${{ env.FUNCTIONS_DIR }}/${{ matrix.function }}/${{ matrix.function }}.xpkg" >> "$GITHUB_ENV"
          echo "RUNTIME_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.function }}-runtime:${image_tag}" >> "$GITHUB_ENV"
          echo "XPKG_VERSION=${image_tag}" >> "$GITHUB_ENV"

      # Crossplane CLI is required to build and push the function packages, so we install it in the workflow.
      - name: Install Crossplane CLI
        shell: bash
        run: |
          set -euo pipefail
          mkdir tmp && cd tmp
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/${{ env.CROSSPLANE_CLI_VERSION }}/install.sh" | sh
          sudo mv crossplane /usr/local/bin

      - name: Login to ghcr.io
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Example tag: ghcr.io/rezakaramad/xtenant-validate-runtime:v0.3.1
      - name: Build runtime image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg GO_VERSION=${{ env.GO_VERSION }} \
            -t "$RUNTIME_IMAGE" \
            "$FUNCTION_PATH"

      - name: Push runtime image
        if: startsWith(github.ref, 'refs/tags/')
        run: docker push "$RUNTIME_IMAGE"

      # Build the Crossplane package (.xpkg) for the function
      - name: Build Crossplane package
        run: |
          crossplane xpkg build \
            --package-root "$FUNCTION_PATH/package" \
            --embed-runtime-image "$RUNTIME_IMAGE" \
            --package-file "$PACKAGE_FILE"

      - name: Push Crossplane package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          crossplane xpkg push \
            -f "$PACKAGE_FILE" \
            "ghcr.io/${{ github.repository_owner }}/${PUBLISHED_FUNCTION_NAME}:${XPKG_VERSION}"

          crossplane xpkg push \
            -f "$PACKAGE_FILE" \
            "ghcr.io/${{ github.repository_owner }}/${PUBLISHED_FUNCTION_NAME}:latest"
